version: "3.9"
services:
  #############################################################################
  # MongoDB ReplicaSet - 2 Nodes + 1 Arbiter
  #############################################################################

  mongodb-primary:
    image: docker.io/bitnami/mongodb:${MONGODB_VERSION:-8.2}
    container_name: mongodb-primary
    restart: always
    hostname: mongodb-primary
    environment:
      MONGODB_REPLICA_SET_MODE: primary
      MONGODB_REPLICA_SET_NAME: ${MONGODB_REPLICA_SET_NAME:-rs0}
      MONGODB_REPLICA_SET_KEY: ${MONGODB_REPLICA_SET_KEY:-resistancereplicasetkey}
      MONGODB_ROOT_PASSWORD: ${MONGODB_ROOT_PASSWORD:-resistance}
      MONGODB_ADVERTISED_HOSTNAME: mongodb-primary
      MONGODB_PORT_NUMBER: 27017
      MONGODB_ENABLE_JOURNAL: "true"
    volumes:
      - mongodb_primary_data:/bitnami/mongodb:rw
    expose:
      - 27017
    ports:
      - "${MONGODB_BIND_IP:-127.0.0.1}:27017:27017"
    healthcheck:
      test: [ "CMD", "mongosh", "--quiet", "--eval", "db.runCommand('ping').ok" ]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s
    networks:
      - resistance-network

  mongodb-secondary:
    image: docker.io/bitnami/mongodb:${MONGODB_VERSION:-8.2}
    container_name: mongodb-secondary
    restart: always
    hostname: mongodb-secondary
    depends_on:
      mongodb-primary:
        condition: service_healthy
    environment:
      MONGODB_REPLICA_SET_MODE: secondary
      MONGODB_REPLICA_SET_NAME: ${MONGODB_REPLICA_SET_NAME:-rs0}
      MONGODB_REPLICA_SET_KEY: ${MONGODB_REPLICA_SET_KEY:-resistancereplicasetkey}
      MONGODB_INITIAL_PRIMARY_HOST: mongodb-primary
      MONGODB_INITIAL_PRIMARY_PORT_NUMBER: 27017
      MONGODB_INITIAL_PRIMARY_ROOT_PASSWORD: ${MONGODB_ROOT_PASSWORD:-resistance}
      MONGODB_ADVERTISED_HOSTNAME: mongodb-secondary
      MONGODB_PORT_NUMBER: 27017
      MONGODB_ENABLE_JOURNAL: "true"
    volumes:
      - mongodb_secondary_data:/bitnami/mongodb:rw
    expose:
      - 27017
    ports:
      - "${MONGODB_BIND_IP:-127.0.0.1}:27018:27017"
    healthcheck:
      test: [ "CMD", "mongosh", "--quiet", "--eval", "db.runCommand('ping').ok" ]
      interval: 10s
      timeout: 10s
      retries: 60
      start_period: 120s
    networks:
      - resistance-network

  mongodb-arbiter:
    image: docker.io/bitnami/mongodb:${MONGODB_VERSION:-8.2}
    container_name: mongodb-arbiter
    restart: always
    hostname: mongodb-arbiter
    depends_on:
      mongodb-primary:
        condition: service_healthy
      mongodb-secondary:
        condition: service_healthy
    environment:
      MONGODB_REPLICA_SET_MODE: arbiter
      MONGODB_REPLICA_SET_NAME: ${MONGODB_REPLICA_SET_NAME:-rs0}
      MONGODB_REPLICA_SET_KEY: ${MONGODB_REPLICA_SET_KEY:-resistancereplicasetkey}
      MONGODB_INITIAL_PRIMARY_HOST: mongodb-primary
      MONGODB_INITIAL_PRIMARY_PORT_NUMBER: 27017
      MONGODB_INITIAL_PRIMARY_ROOT_PASSWORD: ${MONGODB_ROOT_PASSWORD:-resistance}
    healthcheck:
      test: [ "CMD", "mongosh", "--quiet", "--eval", "db.runCommand('ping').ok" ]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s
    networks:
      - resistance-network

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    networks:
      - resistance-network

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: keycloak
    command: ["start-dev","--import-realm"]
    environment:
      KC_HTTP_PORT: 8080
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8081:8080"
    volumes:
      - ./keycloak/realms:/opt/keycloak/data/import
    networks:
      - resistance-network

  backend:
    build:
      context: ../backend
    container_name: backend
    depends_on:
      mongodb-primary:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      keycloak:
        condition: service_started
    environment:
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb-primary:27017,mongodb-secondary:27017,mongodb-arbiter:27017/resistance?replicaSet=rs0}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      OIDC_ISSUER_URI: http://keycloak:8080/realms/resistance
      PORT: 8080
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - resistance-network

volumes:
  mongodb_primary_data:
  mongodb_secondary_data:

#############################################################################
# Networks
#############################################################################

networks:
  resistance-network:
    name: resistance-network