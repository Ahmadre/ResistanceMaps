name: resistance_maps
description: "OpenSource, collective resistance maps"

publish_to: "none"

version: 0.0.1+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  equatable: ^2.0.5
  dio: ^5.7.0
  flutter_map: ^7.0.2
  flutter_map_cancellable_tile_provider: ^3.0.2
  flutter_map_marker_cluster: ^1.2.0
  flutter_map_animations: ^0.8.0
  latlong2: ^0.9.1
  flutter_svg: ^2.0.10+1
  rxdart: ^0.28.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  i18next: ^0.7.1
  routemaster: ^1.0.1
  oauth2_client: ^3.2.2
  flutter_web_auth_2: ^3.0.4
  jwt_decode: ^0.3.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  wolt_modal_sheet: ^0.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  freezed: ^2.5.2
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/i18n/
