name: resistance_maps
description: "OpenSource, collective resistance maps"

publish_to: "none"

version: 0.0.1+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.0
  bloc: ^9.0.0
  equatable: ^2.0.8
  dio: ^5.9.0
  flutter_map: ^8.0.0
  flutter_map_marker_cluster: ^8.2.2
  flutter_map_animations: ^0.9.0
  latlong2: ^0.9.1
  flutter_svg: ^2.2.4
  rxdart: ^0.28.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  i18next: ^0.9.0
  routemaster: ^1.1.0
  oauth2_client: ^4.2.3
  flutter_web_auth_2: ^5.0.1
  jwt_decode: ^0.3.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  wolt_modal_sheet: ^0.11.0
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  freezed: ^2.5.2
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/i18n/
