<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Authentication complete</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Fira Sans', 'Droid Sans', 'Helvetica Neue', Arial, sans-serif; background: #111; color: #ddd; display: grid; place-items: center; height: 100vh; margin: 0; }
      .card { background: #1a1b1f; border-radius: 12px; padding: 24px 28px; box-shadow: 0 8px 30px rgba(0,0,0,.35); }
      .muted { color: #aaa; font-size: 14px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h3>Authentication complete</h3>
      <p class="muted">This window should close automatically. If it doesn't, you may close it manually.</p>
    </div>
    <script>
      (function postAuthenticationMessage() {
        try {
          const href = window.location.href;
          const message = { 'flutter-web-auth-2': href };
          const origin = window.location.origin;

          if (window.opener && !window.opener.closed) {
            window.opener.postMessage(message, origin);
            window.close();
            return;
          }
          if (window.parent && window.parent !== window) {
            window.parent.postMessage(message, origin);
            return;
          }
          // Fallback for strict popup blockers
          try { localStorage.setItem('flutter-web-auth-2', href); } catch (_) {}
          window.close();
        } catch (e) {
          console.error('auth.html error', e);
        }
      })();
    </script>
  </body>
  </html>
