server:
  port: ${PORT:8080}
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 60MB

spring:
  application:
    name: resistance-maps
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://mongo1:27017,mongo2:27018,mongo3:27019/resistance?replicaSet=rs0}
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${OIDC_JWKS_URI:http://keycloak:8080/realms/resistance/protocol/openid-connect/certs}

app:
  storage:
    upload-dir: ${UPLOAD_DIR:./uploads}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO
    org.springframework.security: ${LOG_SECURITY:INFO}
